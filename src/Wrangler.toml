name = "notes"
main = "worker.js"
compatibility_date = "2026-06-01"

# D1 数据库绑定。binding 必须是 "NOTE_DB"（worker.js 里用的是 env.NOTE_DB）。
# database_id 先留空占位，执行 `wrangler d1 create` 后把输出的 id 粘进来。
[[d1_databases]]
binding = "NOTE_DB"
database_name = "notes-db"
database_id = "在这里粘贴 d1 create 输出的 database_id"

# 说明：密码等机密不写在这里，部署后用 `wrangler secret put` 设置：
#   AUTH_PASSWORD   登录密码
#   SESSION_SECRET  会话签名密钥（随机长串）
#   ENC_KEY         可选，仅当以后把 worker.js 里 ENC_ENABLED 改成 true 时才需要